  subBtnActive:{borderColor:'#FFD700',background:'rgba(255,215,0,0.15)',color:'#FFD700',boxShadow:'0 0 14px rgba(255,215,0,0.15)'},
  submitBtn:{width:'100%',padding:'16px',borderRadius:14,border:'1px solid rgba(255,255,255,0.1)',color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',marginTop:24,transition:'opacity .2s'},
  toast:{position:'fixed',bottom:100,left:'50%',transform:'translateX(-50%)',background:'rgba(0,212,255,0.15)',border:'1px solid rgba(0,212,255,0.3)',color:'#00D4FF',padding:'12px 24px',borderRadius:50,fontSize:14,fontWeight:600,zIndex:200,animation:'toastIn .25s ease',fontFamily:"'Space Mono',monospace",whiteSpace:'nowrap'},
};

// ── App ──
function App() {
  const [entries, setEntries] = useState([]);
  const [view, setView] = useState('home');
  const [addType, setAddType] = useState(null);
  const [form, setForm] = useState({amount:'',category:'',sub:'',note:'',date:new Date().toISOString().slice(0,10)});
  const [loading, setLoading] = useState(true);
  const [selMonth, setSelMonth] = useState(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');});
  const [delConfirm, setDelConfirm] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(()=>{
    const d = storage.get('haushalt-data');
    if (d) setEntries(d);
    setLoading(false);
  },[]);

  const save = (data)=>{ storage.set('haushalt-data', data); };
  const flash = (m)=>{ setToast(m); setTimeout(()=>setToast(null),2200); };

  const addEntry = ()=>{
    if (!form.amount||!form.category) return;
    const needsSub = CATS_EXP.find(c=>c.id===form.category)?.subs;
    if (needsSub && !form.sub) return;
    const e = {id:gid(),type:addType,amount:Math.abs(parseFloat(form.amount.replace(',','.'))),category:form.category,sub:form.sub||'',note:form.note,date:form.date};
    const next = [e,...entries];
    setEntries(next); save(next);
    setForm({amount:'',category:'',sub:'',note:'',date:new Date().toISOString().slice(0,10)});
    setAddType(null); setView('home');
    flash(addType==='income'?'Einnahme gespeichert ✓':'Ausgabe gespeichert ✓');
  };

  const del = (id)=>{
    const next = entries.filter(e=>e.id!==id);
    setEntries(next); save(next); setDelConfirm(null); flash('Gelöscht');
  };

  const me = entries.filter(e=>e.date?.startsWith(selMonth));
  const totIn = me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totEx = me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const bal = totIn - totEx;

  const cg = {};
  me.filter(e=>e.type==='expense').forEach(e=>{cg[e.category]=(cg[e.category]||0)+e.amount;});
  const sc = Object.entries(cg).sort((a,b)=>b[1]-a[1]);

  const allM = [...new Set(entries.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  if (!allM.includes(selMonth)) allM.unshift(selMonth);

  const mLabel = (()=>{const[y,m]=selMonth.split('-');return MONTHS[parseInt(m,10)-1]+' '+y;})();
  const cats = addType==='income'?CATS_INC:CATS_EXP;

  if (loading) return h('div',{style:{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh'}},
    h('div',{style:{width:32,height:32,border:'2px solid rgba(0,212,255,0.15)',borderTopColor:'#00D4FF',borderRadius:'50%',animation:'spin .7s linear infinite'}})
  );

  // HOME
  if (view === 'home') return h('div',{style:S.app},
    toast && h('div',{style:S.toast},toast),
    h('div',{style:{animation:'fadeIn .4s ease'}},
      // Header
      h('div',{style:S.header},
        h('div',{style:S.headerRow},
          h('div',null,
            h('span',{style:S.headerSub},'HAUSHALTSBUCH'),
            h('h1',{style:S.headerTitle},mLabel)
          ),
          h('div',{style:S.headerOrb},h('div',{style:S.orbInner}))
        )
      ),
      // Months
      h('div',{style:S.monthRow},
        allM.slice(0,6).map(m=>{
          const mm=m.split('-')[1];
          const active=m===selMonth;
          return h('button',{key:m,onClick:()=>setSelMonth(m),style:{...S.monthChip,...(active?S.monthChipActive:{})}},
            MONTHS[parseInt(mm,10)-1]?.slice(0,3)
          );
        })
      ),
      // Balance
      h('div',{className:'holo-card',style:S.balanceCard},
        h('div',{style:S.balanceLabel},'BILANZ'),
        h('div',{style:{...S.balanceAmount,color:bal>=0?'#00FFD5':'#FF4D6A'}},(bal>=0?'+':'')+fmt(bal)),
        h('div',{style:S.balanceRow},
          h('div',{style:S.balanceCol},
            h('div',{style:S.balanceSmallLabel},'Einnahmen'),
            h('div',{style:{...S.balanceSmall,color:'#00FFD5'}},'+'+fmt(totIn))
          ),
          h('div',{style:{width:1,background:'rgba(0,212,255,0.15)',alignSelf:'stretch'}}),
          h('div',{style:S.balanceCol},
            h('div',{style:S.balanceSmallLabel},'Ausgaben'),
            h('div',{style:{...S.balanceSmall,color:'#FF4D6A'}},'-'+fmt(totEx))
          )
        )
      ),
      // Categories
      sc.length>0 && h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'AUSGABEN'),
        sc.map(([cid,tot],i)=>{
          const ci=catInfo(cid);
          const pct=totEx>0?(tot/totEx)*100:0;
          return h('div',{key:cid,className:'holo-card',style:{...S.catRow,animationDelay:i*60+'ms'}},
            h('div',{style:S.iconWrap},icon(cid,36)),
            h('div',{style:{flex:1}},
              h('div',{style:S.catLabel},ci.label),
              h('div',{style:S.catBar},h('div',{style:{...S.catBarFill,width:pct+'%'}}))
            ),
            h('span',{style:S.catAmount},fmt(tot))
          );
        })
      ),
      // Entries
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'LETZTE BUCHUNGEN'),
        me.length===0 && h('div',{style:S.empty},'Noch keine Buchungen.'),
        me.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map((e,i)=>{
          const ci=catInfo(e.category);
          const sub = e.sub||'';
          const note = e.note||'';
          const detail = [sub,note].filter(Boolean).join(' · ');
          const dateStr = new Date(e.date).toLocaleDateString('de-DE',{day:'numeric',month:'short'});
          return h('div',{key:e.id,className:'entry-row',style:{...S.entryRow,animationDelay:i*40+'ms'},onClick:()=>setDelConfirm(e.id)},
            h('div',{style:S.iconWrap},icon(e.category,34)),
            h('div',{style:{flex:1}},
              h('div',{style:S.entryLabel},ci.label),
              h('div',{style:S.entryDate},(detail?detail+' · ':'')+dateStr)
            ),
            h('span',{style:{...S.entryAmount,color:e.type==='income'?'#00FFD5':'#FF4D6A'}},
              (e.type==='income'?'+':'-')+fmt(e.amount)
            )
          );
        })
      ),
      // Delete modal
      delConfirm && h('div',{style:S.overlay,onClick:()=>setDelConfirm(null)},
        h('div',{style:S.confirmBox,onClick:e=>e.stopPropagation()},
          h('div',{style:S.confirmTitle},'Eintrag löschen?'),
          h('div',{style:S.confirmBtns},
            h('button',{style:S.confirmCancel,onClick:()=>setDelConfirm(null)},'Abbrechen'),
            h('button',{style:S.confirmDelete,onClick:()=>del(delConfirm)},'Löschen')
          )
        )
      ),
      // FABs
      h('div',{style:S.fabRow},
        h('button',{style:{...S.fab,background:'linear-gradient(135deg,#004D40,#00796B)',boxShadow:'0 4px 24px rgba(0,255,213,0.25)'},onClick:()=>{setAddType('income');setView('add');}},
          h('span',{style:S.fabIcon},'+'),h('span',null,'Einnahme')
        ),
        h('button',{style:{...S.fab,background:'linear-gradient(135deg,#5C1126,#8B1538)',boxShadow:'0 4px 24px rgba(255,77,106,0.25)'},onClick:()=>{setAddType('expense');setView('add');}},
          h('span',{style:S.fabIcon},'−'),h('span',null,'Ausgabe')
        )
      ),
      h('div',{style:{height:100}})
    )
  );

  // ADD
  const activeCat = ALL_CATS.find(c=>c.id===form.category);
  const needsSub = activeCat?.subs;
  const canSubmit = form.amount && form.category && (!needsSub || form.sub);

  return h('div',{style:S.app},
    toast && h('div',{style:S.toast},toast),
    h('div',{style:{animation:'slideUp .3s ease'}},
      h('div',{style:S.addHeader},
        h('button',{style:S.backBtn,onClick:()=>{setView('home');setAddType(null);}},'← Zurück'),
        h('h2',{style:S.addTitle},addType==='income'?'Einnahme':'Ausgabe')
      ),
      h('div',{className:'holo-card',style:S.formCard},
        h('label',{style:S.label},'BETRAG (€)'),
        h('input',{type:'number',inputMode:'decimal',style:S.input,placeholder:'0,00',value:form.amount,
          onChange:e=>setForm({...form,amount:e.target.value}),autoFocus:true}),

        h('label',{style:S.label},'KATEGORIE'),
        h('div',{style:S.catGrid},
          cats.map(c=>
            h('button',{key:c.id,style:{...S.catBtn,...(form.category===c.id?S.catBtnActive:{})},
              onClick:()=>setForm({...form,category:c.id,sub:''})},
              icon(c.id,28),
              h('span',{style:S.catBtnLabel},c.label)
            )
          )
        ),

        // Subcategories
        needsSub && h('div',null,
          h('label',{style:S.label},'GESCHÄFT'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:8}},
            activeCat.subs.map(store=>
              h('button',{key:store,style:{...S.subBtn,...(form.sub===store?S.subBtnActive:{})},
                onClick:()=>setForm({...form,sub:store})},store)
            )
          )
        ),

        h('label',{style:S.label},'DATUM'),
        h('input',{type:'date',style:S.input,value:form.date,
          onChange:e=>setForm({...form,date:e.target.value})}),

        h('label',{style:S.label},'NOTIZ (OPTIONAL)'),
        h('input',{type:'text',style:S.input,placeholder:'z.B. Wocheneinkauf',value:form.note,
          onChange:e=>setForm({...form,note:e.target.value})}),

        h('button',{style:{...S.submitBtn,
          background:addType==='income'?'linear-gradient(135deg,#004D40,#00796B)':'linear-gradient(135deg,#5C1126,#8B1538)',
          opacity:canSubmit?1:0.35},disabled:!canSubmit,onClick:addEntry},
          (addType==='income'?'Einnahme':'Ausgabe')+' speichern'
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
